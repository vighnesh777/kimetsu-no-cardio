name: Deploy to GitHub Pages

on:
  push:
    branches: [main]        # deploy on every push to main
  workflow_dispatch:        # also allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel older queued runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # VITE_REPO_NAME sets the base path for GitHub Pages.
        # VITE_HEVY_API_KEY is stored as a GitHub Secret (repo Settings → Secrets → Actions).
        run: VITE_REPO_NAME=${{ github.event.repository.name }} VITE_HEVY_API_KEY=${{ secrets.VITE_HEVY_API_KEY }} npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
