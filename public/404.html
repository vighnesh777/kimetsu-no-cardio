<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kimetsu no Cardio</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the current path into the query string and redirects to index.html,
      // where a companion script (in index.html) decodes it and restores the URL.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
